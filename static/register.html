<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cssc.css">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/alertify.js/0.3.11/alertify.bootstrap.css' integrity='sha512-eauod+oRhJ84heQKG7Koq4RFiVEXhqhi14M+3+m/6XPJ/FmRHz4yDJ9mtz1X8HdOmQjdX69Wg8/rKal7lgEfsw==' crossorigin='anonymous'/>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/alertify.js/0.3.11/alertify.js' integrity='sha512-7Qu5pr+fIUNnTgU03DC5Y1b3brNO64CQUCT1X+hEcbMM8NGasu+WWBVtF7byk01X+gFdZqSPDpOV3y5lFair0A==' crossorigin='anonymous'></script>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/alertify.js/0.3.11/alertify.core.css' integrity='sha512-eZih0rne5vAjEWet1syNsU3LTj1TygGLuLq304xv+JZeaIqi1E1OCbYFD0YPMqhgqFYoOH28QJzJIj+wkVWm+A==' crossorigin='anonymous'/>

</head>
<body>
    <header>
        <h1>REGISTER</h1>
    </header>
    <main id="register">
        <form>
            <label for="login">login</label>
            <input id="label" type="text" name="login" placeholder="login" required>
            <label id="label" for="password">Password</label>
            <input id="label" type="password" name="password" placeholder="Password" required>
            <label id="label" for="confirm_password">Confirm Password</label>
            <input id="label" type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <a href="/login">Already have account?🤑</a>
    </main>
    <script>
        const form = document.querySelector("form")
        form.addEventListener("submit", async (e) => {
            e.preventDefault()
            let data = {
                login: e.target["login"].value,
                password: e.target["password"].value
            }
            console.log(data)
            if (data.login.length < 3) {
                alertify.error("Login do not match")
                return
            }
            if (data.password.length < 6) {
                alertify.error("Password do not match")
                return
            }

            fetch("/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }).then(res => {
                if (res.ok){
                    navigation.navigate("/")
                } else {
                    alertify.error("Login failed")
                }})
        })
        

    </script>
</body>

</html>
